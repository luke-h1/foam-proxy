# Pre-commit hooks. Install: uv tool install pre-commit && uv tool install commitizen && pre-commit install && pre-commit install --hook-type commit-msg

default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: env GOCACHE=/tmp/go-build go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4 run --new-from-rev HEAD --fix
        language: system
        types: [go]
        require_serial: true
        pass_filenames: false
      - id: golangci-lint-config-verify
        name: golangci-lint-config-verify
        entry: env GOCACHE=/tmp/go-build go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4 config verify
        language: system
        files: '\.golangci\.(?:yml|yaml|toml|json)'
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
