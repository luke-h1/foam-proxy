name: Cloudflare WAF Terraform

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terraform/cloudflare-waf/**"
      - ".github/workflows/terraform-cloudflare-waf.yml"
      - ".github/actions/load-cloudflare-waf-secrets/**"
  push:
    branches: [main]
    paths:
      - "terraform/cloudflare-waf/**"
      - ".github/workflows/terraform-cloudflare-waf.yml"
      - ".github/actions/load-cloudflare-waf-secrets/**"

permissions:
  contents: read

concurrency:
  group: terraform-cloudflare-waf
  cancel-in-progress: false

defaults:
  run:
    working-directory: terraform/cloudflare-waf

jobs:
  plan:
    name: Terraform plan
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2
          mask-aws-account-id: true

      - name: Load cloudflare WAF secrets
        uses: ./.github/actions/load-cloudflare-waf-secrets
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Terraform fmt -check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan -input=false -no-color -out=tfplan
          {
            echo "## Cloudflare WAF terraform plan"
            echo ""
            echo '```'
            terraform show -no-color tfplan | tail -n 60
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Terraform apply
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2
          mask-aws-account-id: true

      - name: Load cloudflare WAF secrets
        uses: ./.github/actions/load-cloudflare-waf-secrets
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

      - name: Summary
        run: |
          {
            echo "## Cloudflare WAF applied"
            echo ""
            echo "Rate-limit ruleset ID: $(terraform output -raw rate_limit_ruleset_id)"
          } >> "$GITHUB_STEP_SUMMARY"
