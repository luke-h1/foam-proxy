name: Deploy production
on:
  workflow_dispatch:
  push:
    branches:
      - main
concurrency:
  group: build-production-version
  cancel-in-progress: false
permissions:
  issues: write
  contents: write
  pull-requests: write

env:
  TF_VAR_env: production
  TF_VAR_api_key: ${{ secrets.API_KEY }}
  TF_VAR_zone_id: ${{ secrets.ZONE_ID }}
  TF_VAR_root_domain: foam-app.com
  TF_VAR_private_key: ${{ secrets.PRODUCTION_PRIVATE_KEY }}
  TF_VAR_certificate_body: ${{ secrets.PRODUCTION_CERTIFICATE_BODY }}
  TF_VAR_certificate_chain: ${{ secrets.CERTIFICATE_CHAIN }}
  TF_VAR_deployed_by: ${{ github.actor }}
  TF_VAR_git_sha: ${{ github.sha }}
  TF_VAR_authorizer_dsn: ${{ secrets.SENTRY_AUTHORIZER_DSN }}
  TF_VAR_proxy_dsn: ${{ secrets.SENTRY_PROXY_DSN }}

jobs:
  release:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Load secrets
        id: load_secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_TWITCH_CLIENT_ID: op://ci-cd/foam-proxy-production/APP_TWITCH_CLIENT_ID
          APP_TWITCH_CLIENT_SECRET: op://ci-cd/foam-proxy-production/APP_TWITCH_CLIENT_SECRET
          MENUBAR_TWITCH_CLIENT_ID: op://ci-cd/foam-proxy-production/MENUBAR_TWITCH_CLIENT_ID
          MENUBAR_TWITCH_CLIENT_SECRET: op://ci-cd/foam-proxy-production/MENUBAR_TWITCH_CLIENT_SECRET
          PUSHGATEWAY_URL: op://ci-cd/foam-proxy-production/PUSHGATEWAY_URL
          PUSHGATEWAY_AUTH_HEADER: op://ci-cd/foam-proxy-production/PUSHGATEWAY_AUTH_HEADER
          OP_ENV_FILE: ".env"

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_app_twitch_client_id=$APP_TWITCH_CLIENT_ID" >> $GITHUB_ENV
          echo "TF_VAR_app_twitch_client_secret=$APP_TWITCH_CLIENT_SECRET" >> $GITHUB_ENV
          echo "TF_VAR_menubar_twitch_client_id=$MENUBAR_TWITCH_CLIENT_ID" >> $GITHUB_ENV
          echo "TF_VAR_menubar_twitch_client_secret=$MENUBAR_TWITCH_CLIENT_SECRET" >> $GITHUB_ENV
          echo "TF_VAR_pushgateway_url=$PUSHGATEWAY_URL" >> $GITHUB_ENV
          echo "TF_VAR_pushgateway_auth_header=$PUSHGATEWAY_AUTH_HEADER" >> $GITHUB_ENV
          
      - name: Install
        uses: ./.github/actions/install

      - name: Validate
        uses: ./.github/actions/validate

      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          environment: production
          aws-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-version:
    name: Bump version and tag
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install git-cliff
        run: |
          ARCH=$(uname -m)
          [ "$ARCH" = "x86_64" ] && ARCH=x86_64 || true
          [ "$ARCH" = "aarch64" ] && ARCH=aarch64 || true
          TAG=$(curl -sSf https://api.github.com/repos/orhun/git-cliff/releases/latest | jq -r .tag_name)
          URL="https://github.com/orhun/git-cliff/releases/download/${TAG}/git-cliff-${TAG#v}-${ARCH}-unknown-linux-gnu.tar.gz"
          curl -sSfL "$URL" | tar xz
          mv git-cliff-*/git-cliff ./git-cliff
          chmod +x ./git-cliff

      - name: Bumped version
        id: bump
        run: |
          v=$(./git-cliff --bumped-version 2>/dev/null || echo "0.1.0")
          v=$(echo "$v" | sed 's/^v*//')
          echo "version=$v" >> $GITHUB_OUTPUT
          echo "Release version: $v"

      - name: Create and push tag
        run: |
          git config user.name '${{ github.actor }}'
          git config user.email '${{ github.actor }}@users.noreply.github.com'
          VERSION="${{ steps.bump.outputs.version }}"
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists, skipping"
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
          fi

      - name: Update CHANGELOG for release
        run: |
          ./git-cliff -o CHANGELOG.md
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
