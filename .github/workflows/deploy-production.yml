name: Deploy production
on:
  workflow_dispatch:
    inputs:
      reviewer_account_refresh_enabled:
        description: "Enable the App Review magic link + token keepalive (defaults on; set false to disable the live route)"
        type: boolean
        default: true
  push:
    branches:
      - main
concurrency:
  group: build-production-version
  cancel-in-progress: false
permissions:
  issues: write
  contents: write
  pull-requests: write

env:
  TF_VAR_env: production
  # Magic link stays enabled across automatic main deploys. push events carry no
  # inputs, so the old `inputs.* || false` reset the flag to false on every merge,
  # tore down the SSM blob, and 404d /api/magic. Pushes default ON; a manual
  # workflow_dispatch still honors the toggle (set it false to disable the route).
  TF_VAR_reviewer_account_refresh_enabled: ${{ inputs.reviewer_account_refresh_enabled || github.event_name != 'workflow_dispatch' }}
  TF_VAR_api_key: ${{ secrets.STAGING_API_KEY }}
  TF_VAR_zone_id: ${{ secrets.ZONE_ID }}
  TF_VAR_root_domain: foam-app.com
  TF_VAR_private_key: ${{ secrets.PRODUCTION_PRIVATE_KEY }}
  TF_VAR_certificate_body: ${{ secrets.PRODUCTION_CERTIFICATE_BODY }}
  TF_VAR_certificate_chain: ${{ secrets.CERTIFICATE_CHAIN }}
  TF_VAR_deployed_by: ${{ github.actor }}
  TF_VAR_git_sha: ${{ github.sha }}
  TF_VAR_magic_link_blob: ${{ secrets.MAGIC_LINK_BLOB_PRODUCTION }}

jobs:
  release:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Load secrets
        id: load_secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TWITCH_CLIENT_ID: op://ci-cd/foam-proxy-production/TWITCH_CLIENT_ID
          TWITCH_CLIENT_SECRET: op://ci-cd/foam-proxy-production/TWITCH_CLIENT_SECRET
          TF_VAR_magic_link_api_key: op://ci-cd/foam-proxy-production/MAGIC_LINK_API_KEY
          TF_VAR_telegram_bot_token: op://ci-cd/foam-proxy-production/TELEGRAM_BOT_TOKEN
          TF_VAR_telegram_chat_id: op://ci-cd/foam-proxy-production/TELEGRAM_CHAT_ID
          PROXY_DSN: op://ci-cd/foam-proxy-production/SENTRY_PROXY_DSN
          AUTHORIZER_DSN: op://ci-cd/foam-proxy-production/SENTRY_AUTH_DSN
          OP_ENV_FILE: ".env"

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_twitch_client_id=$TWITCH_CLIENT_ID" >> $GITHUB_ENV
          echo "TF_VAR_twitch_client_secret=$TWITCH_CLIENT_SECRET" >> $GITHUB_ENV
          echo "TF_VAR_proxy_dsn=$PROXY_DSN" >> $GITHUB_ENV
          echo "TF_VAR_authorizer_dsn=$AUTHORIZER_DSN" >> $GITHUB_ENV

      - name: Install
        uses: ./.github/actions/install

      - name: Validate
        uses: ./.github/actions/validate

      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          environment: production
          aws-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-version:
    name: Bump version and tag
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install git-cliff
        run: |
          ARCH=$(uname -m)
          [ "$ARCH" = "x86_64" ] && ARCH=x86_64 || true
          [ "$ARCH" = "aarch64" ] && ARCH=aarch64 || true
          TAG=$(curl -sSf https://api.github.com/repos/orhun/git-cliff/releases/latest | jq -r .tag_name)
          URL="https://github.com/orhun/git-cliff/releases/download/${TAG}/git-cliff-${TAG#v}-${ARCH}-unknown-linux-gnu.tar.gz"
          curl -sSfL "$URL" | tar xz
          mv git-cliff-*/git-cliff ./git-cliff
          chmod +x ./git-cliff

      - name: Bumped version
        id: bump
        run: |
          v=$(./git-cliff --bumped-version 2>/dev/null || echo "0.1.0")
          v=$(echo "$v" | sed 's/^v*//')
          echo "version=$v" >> $GITHUB_OUTPUT
          echo "Release version: $v"

      - name: Create and push tag
        run: |
          git config user.name '${{ github.actor }}'
          git config user.email '${{ github.actor }}@users.noreply.github.com'
          VERSION="${{ steps.bump.outputs.version }}"
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists, skipping"
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
          fi

      - name: Update CHANGELOG for release
        run: |
          ./git-cliff -o CHANGELOG.md
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
