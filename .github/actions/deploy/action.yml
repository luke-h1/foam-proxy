name: Deploy
description: Deploy
inputs:
  environment:
    description: 'The environment to deploy to'
    required: true
  aws-key-id:
    description: "The AWS key to use"
    required: true
  aws-secret-access-key:
    description: "AWS secret access key to use"
    required: true
runs:
  using: composite
  steps:
    - name: Validate environment
      shell: bash
      run: if [ "${{ inputs.environment }}" != "staging" ] && [ "${{ inputs.environment }}" != "production" ]; then echo "Invalid environment"; exit 1; fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ inputs.aws-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: eu-west-2
        mask-aws-account-id: true

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Build lambdas
      uses: ./.github/actions/build

    - name: Terraform init
      shell: bash
      working-directory: terraform
      run: |
        terraform init -backend-config="key=vpc/${{ inputs.environment }}.tfstate" -backend-config="bucket=foam-${{ inputs.environment }}-terraform-state" -input=false

    - name: Deploy DynamoDB lock table if not exists
      shell: bash
      working-directory: terraform
      # Bootstrap-only: create the state lock table on a fresh environment. Skip it
      # once the table exists — a targeted apply refuses to run whenever the config
      # has a pending state move (e.g. adding count to a resource), which would
      # otherwise break every deploy that touches addressing. The unconstrained
      # plan/apply below handles those moves correctly. Checked via the AWS CLI
      # rather than `terraform state list` because the setup-terraform wrapper
      # swallows piped stdout. Table name mirrors aws_dynamodb_table.dynamodb_terraform_lock.
      run: |
        lock_table="foam-proxy-${{ inputs.environment }}-terraform-state-lock"
        if err="$(aws dynamodb describe-table --table-name "$lock_table" 2>&1 >/dev/null)"; then
          echo "Lock table $lock_table already exists; skipping bootstrap apply."
        elif grep -q "ResourceNotFoundException" <<<"$err"; then
          terraform apply -auto-approve -target=aws_dynamodb_table.dynamodb_terraform_lock
        else
          # Real AWS error (IAM, throttling) — not a missing table. Fail loudly.
          echo "$err" >&2
          exit 1
        fi

    - name: Terraform fmt -check
      shell: bash
      working-directory: terraform
      run: terraform fmt -check

    - name: Terraform validate
      shell: bash
      working-directory: terraform
      run: terraform validate

    - name: Terraform plan
      id: plan
      shell: bash
      working-directory: terraform
      run: terraform plan -no-color -out=tfplan

    - name: Terraform apply
      shell: bash
      working-directory: terraform
      run: terraform apply -auto-approve tfplan
