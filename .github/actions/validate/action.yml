name: Validate
description: Validate Go code (build + lint)
runs:
  using: composite
  steps:
    - name: Go build
      run: go build ./...
      shell: bash

    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
      with:
        version: v2.10.1
        skip-cache: true
